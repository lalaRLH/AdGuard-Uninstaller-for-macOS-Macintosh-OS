<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
    <linearGradient id="window" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3c"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48484a"/>
      <stop offset="100%" style="stop-color:#3a3a3c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundclip">
      <rect x="80" y="40" width="740" height="200" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.08"/>
  </pattern>
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- window card -->
  <rect x="80" y="40" width="740" height="200" rx="12" ry="12" fill="url(#window)" filter="url(#shadow)"/>

  <!-- titlebar -->
  <rect x="80" y="40" width="740" height="38" rx="12" ry="12" fill="url(#titlebar)"/>
  <rect x="80" y="60" width="740" height="18" fill="url(#titlebar)"/>

  <!-- traffic lights -->
  <circle cx="112" cy="59" r="6.5" fill="#ff5f57"/>
  <circle cx="133" cy="59" r="6.5" fill="#febc2e"/>
  <circle cx="154" cy="59" r="6.5" fill="#28c840"/>

  <!-- title bar text -->
  <text x="450" y="63" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="13" fill="#ebebf599" text-anchor="middle" letter-spacing="0.3">Terminal — zsh</text>

  <!-- divider -->
  <line x1="80" y1="78" x2="820" y2="78" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- terminal content -->
  <!-- prompt line 1 -->
  <text x="108" y="108" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" fill="#98989d">~</text>
  <text x="122" y="108" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" fill="#636366"> % </text>
  <text x="148" y="108" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" fill="#30d158">curl -fsSL</text>
  <text x="238" y="108" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" fill="#e5e5ea"> https://raw.githubusercontent.com/lalaRLH/</text>
  <text x="148" y="126" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" fill="#e5e5ea">AdGuard-Uninstaller-for-macOS-Macintosh-OS/main/</text>
  <text x="148" y="144" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" fill="#e5e5ea">uninstall-adguard.command <tspan fill="#636366">|</tspan> <tspan fill="#0a84ff">sudo bash</tspan></text>

  <!-- output line -->
  <text x="108" y="168" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" fill="#636366">▸ Starting AdGuard removal...</text>
  <text x="108" y="186" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" fill="#30d158">▸ Done. AdGuard has been fully removed.</text>

  <!-- cursor blink -->
  <rect x="108" y="205" width="8" height="14" fill="#e5e5ea" opacity="0.7" rx="1"/>
</svg>
